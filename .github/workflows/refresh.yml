name: Refresh HerFixtures feeds
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests icalendar pytz
      - name: Run fetch script
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_fixtures.py
      - name: Run WNBA fetch script
        run: python fetch_wnba.py
      - name: Run WNBA team feeds script
        run: python fetch_wnba_teams.py
      - name: Run NWSL fetch script
        run: python fetch_nwsl.py
      - name: Run NWSL team feeds script
        run: python fetch_nwsl_teams.py
      - name: Run ICC Women's T20 fetch script
        run: python fetch_icc_womens_t20.py
      - name: Run ICC Women's T20 team feeds script
        run: python fetch_icc_womens_t20_teams.py
      - name: Generate scores.json for strip
        run: python fetch_scores_json.py
      - name: Commit and push updated feeds
        run: |
          git config user.name "HerFixtures Bot"
          git config user.email "bot@herfixtures.com"
          git add womens_ucl.ics euroleague_women.ics wnba.ics wnba_*.ics nwsl.ics nwsl_*.ics icc_womens_t20.ics icc_womens_t20_*.ics scores.json
          git diff --staged --quiet || git commit -m "Auto-refresh feeds"
          git push
